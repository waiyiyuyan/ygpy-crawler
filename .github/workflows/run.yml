name: Daily Auto Crawl

on:
  schedule:
    - cron: '30 0 * * *' # 每天北京时间 8:30 自动运行
  workflow_dispatch: # 支持手动点击运行

jobs:
  crawl-and-push:
    runs-on: ubuntu-latest
    steps:
    # 1. 下载爬虫代码
    - name: Checkout Crawler
      uses: actions/checkout@v4

    # 2. 设置 Node.js 环境
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    # 3. 安装爬虫所需的第三方依赖
    - name: Install Dependencies
      run: npm install

    # 4. 运行你的爬虫脚本，在当前目录下生成最新的 index.html
    - name: Run Crawler
      run: node crawl.js

    # 5. 【直接覆盖】克隆博客仓库，把最新的 index.html 覆盖到根目录并推送
    - name: Push index.html to Blog Repo
      env:
        API_TOKEN_GITHUB: ${{ secrets.BLOG_DEPLOY_TOKEN }}
      run: |
        # 1. 临时拉取你的博客源码仓库
        git clone https://${{ secrets.BLOG_DEPLOY_TOKEN }}@github.com/waiyiyuyan/waiyiyuyan.github.io.git blog-repo
        
        # 2. 强行把刚刚热乎生成的 index.html 搬运到博客仓库的根目录下（直接覆盖旧首页）
        cp index.html blog-repo/index.html
        
        # 3. 进入博客目录配置身份并推送
        cd blog-repo
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"
        
        git add index.html
        
        # 检查内容到底有没有变动，只有真正有变动才提交，防止死板报错
        if ! git diff --cached --quiet; then
          git commit -m "chore: 自动更新首页内容与SEO"
          git push origin main
        else
          echo "抓取到的内容跟上次一模一样，今天就跳过推送啦！"
        fi
