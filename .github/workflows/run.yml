name: Daily Auto Crawl

on:
  schedule:
    - cron: '30 0 * * *' # 每天北京时间 8:30 自动运行
  workflow_dispatch: # 支持手动点击运行

jobs:
  crawl-and-push:
    runs-on: ubuntu-latest
    steps:
    # 1. 下载爬虫代码
    - name: Checkout Crawler
      uses: actions/checkout@v4

    # 2. 设置环境（去掉刚才卡住你的 cache 检查）
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    # 3. 安装依赖（把 npm ci 改成最普通的 npm install）
    - name: Install Dependencies
      run: npm install

    # 4. 【核心大招】精准把这一个文件推送到你的博客仓库，不影响其他任何东西
    - name: Push Single File to Blog Repo
      uses: dmnemec/copy_file_to_another_repo_action@main
      env:
        API_TOKEN_GITHUB: ${{ secrets.BLOG_DEPLOY_TOKEN }}
      with:
        source_file: 'daily.md'
        destination_repo: 'waiyiyuyan/waiyiyuyan.github.io'
        destination_folder: 'source/_posts'
        user_email: 'github-actions[bot]@users.noreply.github.com'
        user_name: 'github-actions[bot]'
        commit_message: 'chore: 自动更新每日机场资讯'
        target_branch: 'main'
