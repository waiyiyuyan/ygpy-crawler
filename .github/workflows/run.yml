name: Daily Auto Crawl

on:
  schedule:
    - cron: '30 0 * * *' # 每天北京时间 8:30 自动运行
  workflow_dispatch: # 支持手动点击运行

# 🔑 核心新增：必须赋予 Actions 机器人写入当前仓库的权限，否则无法推送 data.json
permissions:
  contents: write

jobs:
  crawl-and-push:
    runs-on: ubuntu-latest
    steps:
    # 1. 下载爬虫代码（直接检出当前仓库）
    - name: Checkout Crawler
      uses: actions/checkout@v4

    # 2. 设置 Node.js 环境
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # 建议使用稳定的长期支持版（LTS），如 20

    # 3. 安装爬虫所需的第三方依赖
    # 💡 提示：如果你的仓库里有 package.json，用 npm install 没问题。
    # 💡 如果运行报错说找不到包，可以把下面这句改为：run: npm install axios cheerio dayjs
    - name: Install Dependencies
      run: npm install

    # 4. 运行你的爬虫脚本，在当前目录下生成最新的 data.json
    - name: Run Crawler
      run: node crawl.js

    # 5. ✨【强推保险版】先添加再检查，100% 捉住新创建的 data.json
    - name: Commit and Push data.json to Current Repo
      run: |
        # 配置 GitHub 官方机器人身份
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"
        
        # 💡 核心修改 1：别管三七二十一，先强制把 data.json 加进 Git 暂存区
        git add data.json
        
        # 💡 核心修改 2：使用更稳妥的 diff --cached 命令来检查暂存区是否有新文件
        if ! git diff --cached --quiet; then
          git commit -m "chore: 自动同步今日最新节点纯数据 [skip ci]"
          git push
        else
          echo "抓取到的节点纯数据跟上次一模一样，今天就跳过推送啦！"
        fi
