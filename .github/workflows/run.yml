name: Daily Auto Crawl

on:
  schedule:
    - cron: '30 0 * * *' # 每天北京时间 8:30 自动运行
  workflow_dispatch: # 支持手动点击运行

jobs:
  crawl-and-push:
    runs-on: ubuntu-latest
    steps:
    # 1. 下载爬虫代码（当前代码仓库）
    - name: Checkout Crawler
      uses: actions/checkout@v4

    # 2. 设置 Node.js 环境
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # 3. 安装爬虫所需的第三方依赖
    - name: Install Dependencies
      run: npm install

    # 4. 运行你的爬虫脚本，在当前目录下生成最新的 data.json
    - name: Run Crawler
      run: node crawl.js

    # 5. 🚀【精准跨仓推送】把生成的 data.json 强行搬运并推送到真实的博客仓库
    - name: Push data.json to Blog Repo
      env:
        API_TOKEN_GITHUB: ${{ secrets.BLOG_DEPLOY_TOKEN }}
      run: |
        # 1. 临时拉取你的目标博客源码仓库到 blog-repo 文件夹
        git clone https://${{ secrets.BLOG_DEPLOY_TOKEN }}@github.com/waiyiyuyan/waiyiyuyan.github.io.git blog-repo
        
        # 2. 强行把刚刚热乎生成的 data.json 复制到博客仓库的根目录下
        cp data.json blog-repo/data.json
        
        # 3. 进入博客仓库目录配置身份并推送
        cd blog-repo
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"
        
        # 4. 先斩后奏：别管是不是新文件，先强行加进 Git 暂存区
        git add data.json
        
        # 5. 精准检查博客仓库里的 data.json 到底有没有变动
        if ! git diff --cached --quiet; then
          git commit -m "chore: 自动同步今日最新节点纯数据 [skip ci]"
          git push origin main
        else
          echo "抓取到的节点纯数据跟博客仓库里的完全一模一样，今天就跳过推送啦！"
        fi
